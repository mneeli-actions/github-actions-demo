name: inputs-workflow

on:
  workflow_dispatch:
    inputs:
      logLevel:
        description: 'Log level'
        required: true
        default: 'warning'
        type: choice
        options:
          - info
          - warning
          - debug
      print_tags:
        description: 'True to print to STDOUT'
        required: true
        type: boolean
      tags:
        description: 'Test scenario tags'
        required: true
        type: string


jobs:
  print-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Print Inputs
        run: |
          echo  The logLevel are : ${{ inputs.logLevel }}
          echo  The print_tags are : ${{ inputs.print_tags }}
          echo  The tags are : ${{ inputs.tags }}
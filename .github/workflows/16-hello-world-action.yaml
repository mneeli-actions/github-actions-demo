name: hello-world-action-workflow
on: workflow_dispatch

jobs:
  say-hello:
    runs-on: ubuntu-latest # Github hosted runners
    steps:
      - name: Greet the world
        id: greet
        uses: mneeli-actions/github-actions-demo/.github/actions/hello-world@main
        with:
          who-to-greet: 'Mahesh Babu Neeli'

      - run: echo random-number "$RANDOM_NUMBER"
        shell: bash
        env:
          RANDOM_NUMBER: ${{ steps.greet.outputs.random-number }}